# Railway — Socket.io sunucusu (Next.js Vercel'de kalır, socket ayrı servis)
# Dashboard: New Project → GitHub → bu repo → otomatik railway.toml okunur

[build]
builder = "NIXPACKS"
# build/install: nixpacks.toml (çift npm ci EBUSY hatası vermesin)

[deploy]
startCommand = "npm run start:socket"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
