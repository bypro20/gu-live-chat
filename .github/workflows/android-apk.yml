name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install & sync Capacitor
        working-directory: mobile
        run: |
          npm ci
          npm run icons
          npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Copy APK to public downloads
        run: |
          mkdir -p public/downloads
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk public/downloads/gulivechat.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gulivechat-apk
          path: public/downloads/gulivechat.apk
          retention-days: 90

      - name: Upload to release (manual tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: public/downloads/gulivechat.apk
